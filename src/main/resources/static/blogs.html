<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/css/style.css">
    <title>Explore Blogs</title>
</head>

<body>

<div class="nav">
    <div class="logo">BlogHub</div>
    <div class="actions">
        <button onclick="dashboard()">Dashboard</button>
        <button onclick="myBlogs()">My Blogs</button>
        <button onclick="create()">Create</button>
    </div>
</div>

<div id="blogs" class="feed"></div>

<div id="modal" class="modal hidden">
    <div class="modal-content">
       <span class="close" onclick="closeModal()">X</span>
        <h2 id="mTitle"></h2>
        <p id="mAuthor"></p>
        <div id="mContent"></div>
    </div>
</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));

function openModal(b) {
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("mTitle").innerText = b.title;
    document.getElementById("mAuthor").innerText = "By " + (b.user ? b.user.name : "Unknown");
    document.getElementById("mContent").innerText = b.content;
}

function closeModal() {
    document.getElementById("modal").classList.add("hidden");
}

function dashboard() { window.location = "/dashboard.html"; }
function create() { window.location = "/create-blog.html"; }
function myBlogs() { window.location = "/my-blogs.html"; }
function edit(id) { window.location = "/edit-blog.html?id=" + id; }

async function remove(id) {
    await fetch("/blogs/" + id, { method: "DELETE" });
    load();
}

async function react(blogId, type) {
    if (!user) { window.location = "/login.html"; return; }
    let res = await fetch(`/blogs/${blogId}/react?userId=${user.id}&type=${type}`, {
        method: "PUT"
    });
    if (res.ok) {
        let data = await res.json();
        document.getElementById("like-" + blogId).innerText = data.likeCount;
        document.getElementById("dislike-" + blogId).innerText = data.dislikeCount;
    }
}

async function load() {
    document.getElementById("blogs").innerHTML = "<p class='loading'>Loading blogs...</p>";

    let response = await fetch("/blogs");
    let data = await response.json();

    let html = "";
    data.forEach(b => {
        html += `
        <div class="blog-card" onclick='openModal(${JSON.stringify(b)})'>
            <div class="blog-header">
                <div class="title">${b.title}</div>
                <div class="author-badge">${b.user ? b.user.name : "Unknown"}</div>
            </div>
            <div class="content">${b.content}</div>
            <div class="blog-footer">
                <button onclick="event.stopPropagation(); edit(${b.id})">Edit</button>
                <button onclick="event.stopPropagation(); remove(${b.id})" class="danger">Delete</button>
                <button onclick="event.stopPropagation(); react(${b.id}, 'LIKE')">Like <span id="like-${b.id}">0</span></button>
                <button onclick="event.stopPropagation(); react(${b.id}, 'DISLIKE')">Dislike <span id="dislike-${b.id}">0</span></button>
            </div>
        </div>
        `;
    });

    document.getElementById("blogs").innerHTML = html;

    // Refresh ke baad database se counts fetch karo
    data.forEach(async b => {
        let res = await fetch(`/blogs/${b.id}/counts`);
        let counts = await res.json();
        document.getElementById("like-" + b.id).innerText = counts.likeCount;
        document.getElementById("dislike-" + b.id).innerText = counts.dislikeCount;
    });
}

load();

</script>

</body>
</html>
