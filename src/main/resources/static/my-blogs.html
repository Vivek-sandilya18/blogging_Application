<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>My Blogs</title>
</head>

<body>

<div class="nav">
    <div class="logo">My Blogs</div>
    <button onclick="back()">Dashboard</button>
</div>

<div id="blogs" class="blog-wrapper"></div>

<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">X</span>
        <h2 id="mTitle"></h2>
        <img id="mImage" src="" style="width:100%; border-radius:12px; margin:10px 0; display:none;">
        <video id="mVideo" src="" controls style="width:100%; border-radius:12px; margin:10px 0; display:none;"></video>
        <p id="mContent"></p>

        <div class="comment-section" style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <h4>Comments</h4>
            <div id="commentsList" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
            <textarea id="commentInput" placeholder="Write a comment..." style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; resize:vertical;"></textarea>
            <button onclick="postComment()" style="margin-top:8px;">Post Comment</button>
        </div>
    </div>
</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));
let currentBlogId = null;

function openModal(b) {
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("mTitle").innerText = b.title;
    document.getElementById("mContent").innerText = b.content;

    let mImage = document.getElementById("mImage");
    let mVideo = document.getElementById("mVideo");

    if (b.imageUrl) {
        if (b.imageUrl.includes('/video/')) {
            mVideo.src = b.imageUrl;
            mVideo.style.display = "block";
            mImage.style.display = "none";
        } else {
            mImage.src = b.imageUrl;
            mImage.style.display = "block";
            mVideo.style.display = "none";
        }
    } else {
        mImage.style.display = "none";
        mVideo.style.display = "none";
    }

    currentBlogId = b.id;
    loadComments(b.id);
}

function closeModal() {
    document.getElementById("modal").classList.add("hidden");
}

function back() {
    window.location = "/dashboard.html";
}

function edit(id) {
    window.location = "/edit-blog.html?id=" + id;
}

async function load() {
    let response = await fetch("/blogs/my?userId=" + user.id);
    let data = await response.json();

    let html = "";
    data.forEach(b => {
        html += `
        <div class="blog-item" onclick='openModal(${JSON.stringify(b)})'>
            <div class="title">${b.title}</div>

            ${b.imageUrl ? (b.imageUrl.includes('/video/') ?
                `<video src="${b.imageUrl}" controls style="width:100%; border-radius:12px; margin:10px 0; max-height:300px;"></video>` :
                `<img src="${b.imageUrl}" style="width:100%; border-radius:12px; margin:10px 0; max-height:300px; object-fit:cover;">`)
            : ""}

            <div class="content">${b.content}</div>
            <div class="item-footer">
                <button onclick="event.stopPropagation(); edit(${b.id})">Edit</button>
                <button onclick="event.stopPropagation(); removeBlog(${b.id})" class="danger">Delete</button>
                <button onclick="event.stopPropagation(); react(${b.id}, 'LIKE')">Like <span id="like-${b.id}">0</span></button>
                <button onclick="event.stopPropagation(); react(${b.id}, 'DISLIKE')">Dislike <span id="dislike-${b.id}">0</span></button>
                <button onclick="event.stopPropagation(); openModal(${JSON.stringify(b)})">Comments <span id="comment-${b.id}">0</span></button>
            </div>
        </div>
        `;
    });

    document.getElementById("blogs").innerHTML = html;

    data.forEach(async b => {
        let res = await fetch(`/blogs/${b.id}/counts`);
        let counts = await res.json();
        document.getElementById("like-" + b.id).innerText = counts.likeCount;
        document.getElementById("dislike-" + b.id).innerText = counts.dislikeCount;

        let cRes = await fetch(`/blogs/${b.id}/comments`);
        let cData = await cRes.json();
        document.getElementById("comment-" + b.id).innerText = cData.length;
    });
}

async function removeBlog(id) {
    let confirmDelete = confirm("Are you sure you want to delete this blog?");
    if (!confirmDelete) return;
    await fetch("/blogs/" + id, { method: "DELETE" });
    load();
}

async function react(blogId, type) {
    let res = await fetch(`/blogs/${blogId}/react?userId=${user.id}&type=${type}`, {
        method: "PUT"
    });
    if (res.ok) {
        let data = await res.json();
        document.getElementById("like-" + blogId).innerText = data.likeCount;
        document.getElementById("dislike-" + blogId).innerText = data.dislikeCount;
    }
}

async function loadComments(blogId) {
    let res = await fetch(`/blogs/${blogId}/comments`);
    let comments = await res.json();

    let html = comments.map(c => `
        <div class="comment-item" style="padding:6px 0; border-bottom:1px solid #f0f0f0;">
            <strong>${c.username}</strong>
            <p style="margin:2px 0;">${c.content}</p>
        </div>
    `).join("");

    document.getElementById("commentsList").innerHTML = html || "<p style='color:#888;'>No comments yet.</p>";

    let countEl = document.getElementById("comment-" + blogId);
    if (countEl) countEl.innerText = comments.length;
}

async function postComment() {
    if (!user) { window.location = "/login.html"; return; }

    let content = document.getElementById("commentInput").value.trim();
    if (!content) return;

    await fetch(`/blogs/${currentBlogId}/comments?userId=${user.id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content })
    });

    document.getElementById("commentInput").value = "";
    loadComments(currentBlogId);
}

load();

</script>

</body>
</html>
