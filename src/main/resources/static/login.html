<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link
	rel="stylesheet"
	href="/css/style.css">
<title>Login</title>


</head>

<body>

<div class="card">

<h1>

Welcome Back

</h1>

<input
id="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button
onclick="login()">

Login

</button>

<p>

New here?

<a href="/index.html">

Create Account

</a>

</p>

</div>

<script>

async function login(){

let response=

await fetch(

"/users/login",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify({

email:
email.value,

password:
password.value

})

}

);

if(
response.ok
){

let user=

await response.json();

localStorage.setItem(

"user",

JSON.stringify(
user
)

);

window.location=
"/dashboard.html";

}
else{

alert(
"Invalid Login"
);

}

}

</script>

</body>

</html>
