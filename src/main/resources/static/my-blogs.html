<!DOCTYPE html>
<html>

<head>
	<link
	rel="stylesheet"
	href="/css/style.css">
<title>My Blogs</title>



</head>

<body>

<div class="nav">

<div class="logo">

My Blogs

</div>

<button
onclick="back()">

Dashboard

</button>

</div>

<div
id="blogs"
class="container">

</div>

<script>

	function openModal(b){

	  document.getElementById("modal").classList.remove("hidden");

	  document.getElementById("mTitle").innerText = b.title;

	  document.getElementById("mContent").innerText = b.content;
	}

	function closeModal(){
	  document.getElementById("modal").classList.add("hidden");
	}
let user=

JSON.parse(

localStorage
.getItem(
"user"
)

);

async function load(){

let response=

await fetch(

"/blogs/my?userId="

+

user.id

);

let data=

await response.json();

let html="";

data.forEach(

b=>{

	html+=`
	<div class="card" onclick='openModal(${JSON.stringify(b)})'>

<div class="title">

${b.title}

</div>

<div class="content">

${b.content}

</div>

</div>
<div class="actions">

   <button onclick="edit(${b.id})">
      Edit
   </button>

   <button onclick="removeBlog(${b.id})" class="danger">
      Delete
   </button>

 </div>

`;

}

);

blogs.innerHTML=

html;

}

function back(){

window.location=
"/dashboard.html";

}

load();
async function removeBlog(id){

  let confirmDelete = confirm("Are you sure you want to delete this blog?");

  if(!confirmDelete) return;

  await fetch("/blogs/" + id, {
    method: "DELETE"
  });
  function edit(id){
    window.location = "/edit-blog.html?id=" + id;
  }

  load();
}

</script>
<div id="modal" class="modal hidden">

  <div class="modal-content">

    <span class="close" onclick="closeModal()">*</span>

    <h2 id="mTitle"></h2>

    <p id="mContent"></p>

  </div>

</div>

</body>

</html>
