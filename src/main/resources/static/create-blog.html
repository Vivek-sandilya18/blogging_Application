<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Create Blog</title>
</head>

<body>

<div class="nav">
    <div class="logo">BlogHub</div>
    <button onclick="dashboard()">Dashboard</button>
</div>

<div class="container">
    <div class="card editor-card">

        <input id="title" placeholder="Write your title...">

        <textarea id="content" placeholder="Start writing..."></textarea>

        <!-- Image upload -->
        <div class="image-upload">
            <label for="image">Photo / Video choose karo:</label>
            <input type="file" id="image" accept="image/*,video/*">
        </div>

        <!-- Preview -->
        <div id="preview"></div>

        <div class="actions">
            <button class="publish" onclick="publish()">Publish</button>
        </div>

    </div>
</div>

<script>

function dashboard(){
    window.location = "/dashboard.html";
}

// Image preview
document.getElementById("image").addEventListener("change", function() {
    let file = this.files[0];
    let preview = document.getElementById("preview");

    if (file) {
        let url = URL.createObjectURL(file);
        if (file.type.startsWith("video")) {
            preview.innerHTML = `<video src="${url}" controls style="width:100%; border-radius:12px; margin-top:10px;"></video>`;
        } else {
            preview.innerHTML = `<img src="${url}" style="width:100%; border-radius:12px; margin-top:10px;">`;
        }
    }
});

async function publish() {

    let user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location = "/login.html";
        return;
    }

    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;
    let imageFile = document.getElementById("image").files[0];

    if (!title || !content) {
        alert("Title aur Content dono bharo!");
        return;
    }

    let formData = new FormData();
    formData.append("blog", JSON.stringify({ title, content }));

    if (imageFile) {
        formData.append("image", imageFile);
    }

    let response = await fetch("/blogs?userId=" + user.id, {
        method: "POST",
        body: formData
    });

    if (response.ok) {
        alert("Published!");
        window.location = "/blogs.html";
    } else {
        alert("Kuch galat ho gaya!");
    }
}

</script>

</body>
</html>
