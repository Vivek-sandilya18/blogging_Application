<!DOCTYPE html>
<html>

<head>
	<link
	rel="stylesheet"
	href="/css/style.css">
<title>Edit Blog</title>



</head>

<body>

<div class="nav">

<div class="logo">

BlogHub

</div>

<button onclick="back()">

Back

</button>

</div>

<div class="container">

<div class="card">

<input
id="title"
placeholder="Title"
>

<textarea
id="content"
placeholder="Write here..."
></textarea>

<div class="actions">

<button
class="delete"
onclick="removeBlog()">

Delete

</button>

<button
class="update"
onclick="updateBlog()">

Update

</button>

</div>

</div>

</div>

<script>

const id=

new URLSearchParams(
window.location.search
)

.get(
"id"
);

async function load(){

let response=

await fetch(

"/blogs/"
+
id

);

let blog=

await response.json();

document
.getElementById(
"title"
)
.value=

blog.title;

document
.getElementById(
"content"
)
.value=

blog.content;

}

async function updateBlog(){

await fetch(

"/blogs/"
+
id,

{

method:"PUT",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify({

title:

document
.getElementById(
"title"
)
.value,

content:

document
.getElementById(
"content"
)
.value

})

}

);

window.location=
"/blogs.html";

}

async function removeBlog(){

await fetch(

"/blogs/"
+
id,

{

method:
"DELETE"

}

);

window.location=
"/blogs.html";

}

function back(){

window.location=
"/blogs.html";

}

load();

</script>

</body>

</html>
